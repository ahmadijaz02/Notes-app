
<!DOCTYPE html>
<html>
<head>
  <title>Notes - Notes App</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: linear-gradient(120deg, #f0f2f5 60%, #e0e7ff 100%); }
    .container { max-width: 650px; margin: 2em auto; background: #fff; border-radius: 12px; box-shadow: 0 4px 24px #b3b3b3; padding: 2.5em; }
    .note-item { background: #f6f8fa; margin-bottom: 1em; padding: 1.2em; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; transition: box-shadow 0.2s; box-shadow: 0 1px 4px #e0e0e0; }
    .note-item:hover { box-shadow: 0 2px 8px #b3b3b3; }
    .note-content { font-size: 1.15em; font-weight: 500; }
    .note-meta { color: #888; font-size: 0.95em; margin-left: 1em; }
    .actions { margin-left: 1em; }
    #notes-list { list-style: none; padding: 0; }
    #note-form { display: flex; gap: 1em; margin-bottom: 2em; }
    #note-form input { flex: 1; padding: 0.7em; border-radius: 6px; border: 1px solid #ccc; font-size: 1em; }
    #note-form button { padding: 0.7em 1.5em; border-radius: 6px; border: none; background: #6366f1; color: #fff; font-weight: bold; cursor: pointer; transition: background 0.2s; }
    #note-form button:hover { background: #4338ca; }
    #user-info { margin-bottom: 1em; font-weight: bold; font-size: 1.1em; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2em; }
    .top-bar a { margin-left: 1em; color: #6366f1; font-weight: bold; text-decoration: none; transition: color 0.2s; }
    .top-bar a:hover { color: #4338ca; text-decoration: underline; }
    .error { color: #c00; margin-bottom: 1em; }
    .note-delete-btn { background: #ef4444; color: #fff; border: none; border-radius: 4px; padding: 0.4em 1em; cursor: pointer; font-size: 0.95em; margin-left: 1em; transition: background 0.2s; }
    .note-delete-btn:hover { background: #b91c1c; }
    @media (max-width: 700px) {
      .container { padding: 1em; }
      #note-form input { font-size: 0.95em; }
      #note-form button { font-size: 0.95em; }
    }
  </style>
</head>
<body style="background:#f0f2f5;">
  <div class="container">
    <div class="top-bar">
      <div id="user-info"></div>
      <div>
        <a href="/audit" id="audit-link" style="display:none">Audit Log</a>
        <a href="/logout">Logout</a>
      </div>
    </div>
    <h2>My Notes</h2>
    <form id="note-form" method="POST" action="/api/notes">
      <input name="content" placeholder="Write a note..." required>
      <button type="submit">Add Note</button>
    </form>
    <div class="error" id="error-msg" style="display:none"></div>
    <ul id="notes-list"></ul>
  </div>
  <script>
    function showError(msg) {
      const err = document.getElementById('error-msg');
      err.textContent = msg;
      err.style.display = msg ? '' : 'none';
    }
    function loadNotes() {
      fetch('/api/notes').then(r => r.json()).then(notes => {
        const list = document.getElementById('notes-list');
        list.innerHTML = '';
        notes.forEach(note => {
          const li = document.createElement('li');
          li.className = 'note-item';
          li.innerHTML = `<span class='note-content'>${note.content}</span> <span class='note-meta'>(by ${note.owner})</span>`;
          if (window.userRole === 'admin' || note.owner === window.username) {
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/api/notes/delete';
            form.style.display = 'inline';
            form.innerHTML = `<input type='hidden' name='id' value='${note._id}'><button type='submit' class='note-delete-btn'>Delete</button>`;
            li.appendChild(form);
          }
          list.appendChild(li);
        });
      }).catch(() => showError('Failed to load notes.'));
    }
    // Show user info
    fetch('/api/user').then(r => r.json()).then(u => {
      window.username = u.username;
      window.userRole = u.role;
      document.getElementById('user-info').textContent = `Logged in as ${u.username} (${u.role})`;
      if (u.role === 'admin') document.getElementById('audit-link').style.display = '';
      loadNotes();
    }).catch(() => showError('Failed to load user info.'));
    // Error handling for note form
    document.getElementById('note-form').addEventListener('submit', function(e) {
      showError('');
    
    });
  </script>
</body>
</html>
