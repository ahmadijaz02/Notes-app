
<!DOCTYPE html>
<html>
<head>
  <title>Sign Up - Notes App</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: linear-gradient(135deg, #6366f1 0%, #a5b4fc 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .signup-container {
      max-width: 400px;
      margin: 2em auto;
      background: rgba(255,255,255,0.95);
      border-radius: 18px;
      box-shadow: 0 8px 32px #6366f1a0;
      padding: 2.5em 2em 2em 2em;
      position: relative;
      animation: fadeIn 0.7s;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    h2 {
      text-align: center;
      margin-bottom: 1.2em;
      font-size: 2em;
      font-weight: 700;
      color: #4338ca;
      letter-spacing: 1px;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 1.2em;
    }
    label {
      font-weight: 600;
      color: #333;
      margin-bottom: 0.3em;
    }
    input {
      padding: 0.8em;
      border-radius: 8px;
      border: 1.5px solid #a5b4fc;
      font-size: 1.05em;
      background: #f3f4f6;
      transition: border 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border: 2px solid #6366f1;
      box-shadow: 0 0 0 2px #a5b4fc44;
      outline: none;
    }
    button {
      padding: 1em;
      background: linear-gradient(90deg, #28a745 60%, #6366f1 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 1.1em;
      box-shadow: 0 2px 8px #6366f144;
      transition: background 0.2s, box-shadow 0.2s;
    }
    button:hover {
      background: linear-gradient(90deg, #6366f1 60%, #28a745 100%);
      box-shadow: 0 4px 16px #6366f188;
    }
    .login-link {
      text-align: center;
      margin-top: 2em;
      display: block;
      color: #6366f1;
      font-weight: bold;
      text-decoration: none;
      font-size: 1.08em;
      letter-spacing: 0.5px;
      transition: color 0.2s;
    }
    .login-link:hover {
      color: #4338ca;
      text-decoration: underline;
    }
    @media (max-width: 500px) {
      .signup-container { padding: 1em; }
      input, button { font-size: 0.95em; }
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <h2>Sign Up</h2>
    <form method="POST" action="/signup">
      <label>Username:<br><input name="username" required></label>
      <label>Password:<br><input name="password" type="password" required></label>
      <button type="submit">Sign Up</button>
    </form>
    <a class="login-link" href="/login">Already have an account? Login</a>
  </div>
</body>
</html>
